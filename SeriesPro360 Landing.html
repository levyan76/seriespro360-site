 param($m) $html=$m.Groups[1].Value; $cls=$m.Groups[2].Value -replace 'sp-light','sp-light'; if ($cls -notmatch 'sp-light') { $cls="sp-light $cls" }; "<html$html class=`"$cls`">" >

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  /* ================================================================
     TOKENS
     ================================================================ */
  :root {
    --sp-accent: #FF6B1A;
    --sp-accent-soft: rgba(255,107,26,0.18);

    /* DARK (default) */
    --sp-bg:        #08090B;
    --sp-bg-2:      #0E0F12;
    --sp-surface:   #131418;
    --sp-card:      #16181D;
    --sp-card-hi:   #1B1D23;
    --sp-border:    rgba(255,255,255,0.08);
    --sp-border-2:  rgba(255,255,255,0.14);
    --sp-text:      #F4F4F5;
    --sp-text-2:    #C7C8CC;
    --sp-muted:     #8A8B90;
    --sp-blueprint: #4A8DF7;
    --sp-green:     #34D399;
    --sp-yellow:    #EAB308;
    --sp-shadow:    0 1px 0 rgba(255,255,255,0.04) inset, 0 12px 40px rgba(0,0,0,0.4);

    --sp-font-display: 'Space Grotesk', system-ui, sans-serif;
    --sp-font-body:    'Inter', system-ui, sans-serif;
    --sp-font-mono:    'JetBrains Mono', ui-monospace, monospace;

    --sp-rad: 14px;
    --sp-rad-sm: 8px;
    --sp-rad-lg: 18px;

    --sp-pad-section: 120px;
    --sp-pad-container: 64px;
  }

  html.sp-light {
    --sp-bg:        #FAFAF7;
    --sp-bg-2:      #F2F2EE;
    --sp-surface:   #FFFFFF;
    --sp-card:      #FFFFFF;
    --sp-card-hi:   #F7F6F2;
    --sp-border:    rgba(15,15,16,0.08);
    --sp-border-2:  rgba(15,15,16,0.16);
    --sp-text:      #0E0F10;
    --sp-text-2:    #2A2B2F;
    --sp-muted:     #6A6B70;
    --sp-blueprint: #1E40AF;
    --sp-green:     #047857;
    --sp-yellow:    #B45309;
    --sp-shadow:    0 1px 0 rgba(255,255,255,0.7) inset, 0 8px 30px rgba(20,20,30,0.06);
  }

  /* DENSITY */
  .sp-density-compact { --sp-pad-section: 80px;  --sp-pad-container: 40px; }
  .sp-density-regular { --sp-pad-section: 120px; --sp-pad-container: 64px; }
  .sp-density-comfy   { --sp-pad-section: 160px; --sp-pad-container: 88px; }

  @media (max-width: 880px) {
    :root { --sp-pad-section: 72px; --sp-pad-container: 22px; }
    .sp-density-comfy { --sp-pad-section: 88px; }
  }

  /* ================================================================
     RESET
     ================================================================ */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--sp-bg);
    color: var(--sp-text);
    font-family: var(--sp-font-body);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    transition: background 0.25s ease, color 0.25s ease;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }
  h1, h2, h3, h4 { font-family: var(--sp-font-display); margin: 0; letter-spacing: -0.02em; line-height: 1.05; text-wrap: pretty; }
  p { margin: 0; }
  .mono { font-family: var(--sp-font-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

  html { scroll-behavior: smooth; }
  ::selection { background: var(--sp-accent); color: #fff; }

  /* ================================================================
     SCROLL REVEAL SYSTEM
     ================================================================ */
  .sp-reveal {
    opacity: 0;
    transform: translateY(28px);
    transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    will-change: opacity, transform;
  }
  .sp-reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }
  /* Stagger children */
  .sp-reveal-stagger > * {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .sp-reveal-stagger.is-visible > * { opacity: 1; transform: translateY(0); }
  .sp-reveal-stagger.is-visible > *:nth-child(1) { transition-delay: 0.04s; }
  .sp-reveal-stagger.is-visible > *:nth-child(2) { transition-delay: 0.08s; }
  .sp-reveal-stagger.is-visible > *:nth-child(3) { transition-delay: 0.12s; }
  .sp-reveal-stagger.is-visible > *:nth-child(4) { transition-delay: 0.16s; }
  .sp-reveal-stagger.is-visible > *:nth-child(5) { transition-delay: 0.20s; }
  .sp-reveal-stagger.is-visible > *:nth-child(6) { transition-delay: 0.24s; }

  /* GPU compositing for animated elements */
  .sp-hero-mock-frame, .sp-hero-mock-float,
  .sp-product, .sp-plan, .sp-flow-step { will-change: transform; }

  /* Below-fold paint optimization */
  .sp-suite, .sp-demo, .sp-features, .sp-workflow,
  .sp-pricing, .sp-faq, .sp-cta-band, .sp-footer {
    content-visibility: auto;
    contain-intrinsic-size: auto 600px;
  }

  /* Respect reduced motion preference */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
    .sp-reveal, .sp-reveal-stagger > * { opacity: 1; transform: none; }
  }

  /* ================================================================
     LAYOUT PRIMITIVES
     ================================================================ */
  .sp-container { max-width: 1200px; margin: 0 auto; padding: 0 var(--sp-pad-container); }
  .sp-eyebrow {
    font-family: var(--sp-font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--sp-accent);
    font-weight: 500;
    margin-bottom: 14px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .sp-eyebrow::before { content: ""; width: 18px; height: 1px; background: var(--sp-accent); }
  .sp-eyebrow-mini {
    font-family: var(--sp-font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--sp-muted);
  }
  .sp-eyebrow-on-accent { color: var(--sp-accent); }
  .sp-section-title {
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 600;
    color: var(--sp-text);
    max-width: 18ch;
  }
  .sp-section-head { margin-bottom: 56px; }
  .sp-section-head-center { text-align: center; }
  .sp-section-head-center .sp-section-title { margin-left: auto; margin-right: auto; }
  .sp-section-head-center .sp-eyebrow { justify-content: center; }
  .sp-section-sub {
    color: var(--sp-muted);
    font-size: 17px;
    line-height: 1.5;
    max-width: 56ch;
    margin-top: 16px;
  }
  .sp-section-head-center .sp-section-sub { margin-left: auto; margin-right: auto; }

  /* ================================================================
     BUTTONS
     ================================================================ */
  .sp-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 500;
    border-radius: 10px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--sp-text);
    transition: all 0.15s ease;
    white-space: nowrap;
    line-height: 1;
  }
  .sp-btn-sm { padding: 8px 14px; font-size: 13px; }
  .sp-btn-lg { padding: 14px 22px; font-size: 15px; gap: 10px; }
  .sp-btn-primary {
    background: var(--sp-accent);
    color: #fff;
    border-color: var(--sp-accent);
    box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 4px 14px var(--sp-accent-soft);
  }
  .sp-btn-primary:hover { transform: translateY(-1px); filter: brightness(1.08); }
  .sp-btn-ghost { border-color: var(--sp-border-2); color: var(--sp-text); }
  .sp-btn-ghost:hover { background: var(--sp-card-hi); border-color: var(--sp-border-2); }
  .sp-btn-ghost-sm { border-color: var(--sp-border); padding: 7px 12px; font-size: 12.5px; }
  .sp-btn-ghost-sm:hover { background: var(--sp-card-hi); }
  .sp-btn-ghost-on-dark { color: #fff; border-color: rgba(255,255,255,0.3); }
  .sp-btn-ghost-on-dark:hover { background: rgba(255,255,255,0.1); }
  .sp-btn-block { width: 100%; justify-content: center; padding: 12px 16px; }

  /* ================================================================
     NAV
     ================================================================ */
  .sp-nav {
    position: sticky;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: color-mix(in srgb, var(--sp-bg) 70%, transparent);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .sp-nav.is-scrolled { border-bottom-color: var(--sp-border); }
  .sp-nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; gap: 32px;
  }
  .sp-nav-brand { display: flex; align-items: center; }
  .sp-nav-links { display: flex; align-items: center; gap: 28px; }
  .sp-nav-links a {
    font-size: 13.5px; color: var(--sp-text-2); font-weight: 500;
    transition: color 0.15s ease;
  }
  .sp-nav-links a:hover { color: var(--sp-text); }
  .sp-nav-actions { display: flex; align-items: center; gap: 10px; }
  .sp-nav-login { color: var(--sp-text-2); }

  .sp-lang-toggle, .sp-unit-toggle {
    display: inline-flex; align-items: center;
    border: 1px solid var(--sp-border);
    border-radius: 8px; padding: 2px;
    background: var(--sp-card-hi);
  }
  .sp-lang-toggle button, .sp-unit-toggle button {
    padding: 5px 10px; font-size: 11.5px; font-weight: 600;
    background: transparent; border: 0; color: var(--sp-muted);
    border-radius: 6px; font-family: var(--sp-font-mono); letter-spacing: 0.04em;
  }
  .sp-unit-toggle button { padding: 6px 14px; font-size: 12px; font-family: var(--sp-font-body); letter-spacing: 0; }
  .sp-lang-toggle button.is-on, .sp-unit-toggle button.is-on {
    background: var(--sp-bg); color: var(--sp-text);
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  html.sp-light .sp-lang-toggle button.is-on,
  html.sp-light .sp-unit-toggle button.is-on { background: #fff; }

  .sp-theme-toggle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--sp-card-hi); border: 1px solid var(--sp-border);
    color: var(--sp-text-2);
  }
  .sp-theme-toggle:hover { color: var(--sp-text); }

  .sp-nav-burger {
    display: none;
    width: 36px; height: 36px;
    align-items: center; justify-content: center;
    background: var(--sp-card-hi); border: 1px solid var(--sp-border);
    border-radius: 8px; color: var(--sp-text);
  }
  .sp-nav-mobile {
    display: none; flex-direction: column; gap: 4px; padding: 12px var(--sp-pad-container) 20px;
    border-top: 1px solid var(--sp-border);
  }
  .sp-nav-mobile a {
    padding: 12px 8px; font-size: 15px; color: var(--sp-text);
    border-bottom: 1px solid var(--sp-border);
  }
  .sp-nav-mobile a:last-child { border: 0; margin-top: 8px; }

  @media (max-width: 900px) {
    .sp-nav-links, .sp-nav-login { display: none; }
    .sp-nav-burger { display: inline-flex; }
    .sp-nav-mobile { display: flex; }
  }

  /* ================================================================
     HERO
     ================================================================ */
  .sp-hero {
    position: relative;
    padding: 80px 0 var(--sp-pad-section);
    overflow: hidden;
  }
  .sp-hero-grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--sp-border) 1px, transparent 1px),
      linear-gradient(90deg, var(--sp-border) 1px, transparent 1px);
    background-size: 56px 56px;
    background-position: -1px -1px;
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 60% 40%, #000 0%, transparent 75%);
            mask-image: radial-gradient(ellipse 70% 60% at 60% 40%, #000 0%, transparent 75%);
    opacity: 0.7;
    pointer-events: none;
  }
  .sp-hero-inner {
    position: relative; z-index: 2;
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr);
    gap: 64px;
    align-items: center;
  }
  .sp-hero-badge {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--sp-card-hi);
    border: 1px solid var(--sp-border);
    border-radius: 999px;
    padding: 6px 14px 6px 10px;
    font-family: var(--sp-font-mono); font-size: 11.5px; font-weight: 500;
    color: var(--sp-text-2);
    margin-bottom: 24px;
  }
  .sp-hero-badge-dot {
    width: 7px; height: 7px; border-radius: 999px; background: var(--sp-accent);
    box-shadow: 0 0 0 4px var(--sp-accent-soft);
    animation: sp-pulse 2.4s ease-in-out infinite;
  }
  @keyframes sp-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .sp-hero-title {
    font-family: var(--sp-font-display);
    font-size: clamp(40px, 6.4vw, 76px);
    font-weight: 600;
    letter-spacing: -0.035em;
    line-height: 0.98;
    color: var(--sp-text);
  }
  .sp-hero-word { display: inline-block; margin-right: 0.22em; }
  .sp-hero-word-accent { color: var(--sp-accent); }
  .sp-hero-period { color: var(--sp-accent); }
  .sp-hero-word:not(.sp-hero-word-accent) .sp-hero-period { color: var(--sp-text-2); opacity: 0.5; }
  .sp-hero-tail {
    display: block;
    font-family: var(--sp-font-body);
    font-size: clamp(20px, 2.4vw, 28px);
    font-weight: 400;
    color: var(--sp-muted);
    letter-spacing: -0.01em;
    margin-top: 18px;
  }
  .sp-hero-sub {
    font-size: 17px; line-height: 1.55;
    color: var(--sp-text-2);
    max-width: 52ch;
    margin: 28px 0 0;
  }
  .sp-hero-ctas { display: flex; gap: 12px; margin-top: 36px; flex-wrap: wrap; }
  .sp-hero-meta {
    list-style: none; padding: 0; margin: 28px 0 0;
    display: flex; flex-wrap: wrap; gap: 18px;
    font-size: 13px; color: var(--sp-muted);
  }
  .sp-hero-meta li { display: inline-flex; align-items: center; gap: 6px; }
  .sp-hero-meta svg { color: var(--sp-green); }

  /* HERO MOCK */
  .sp-hero-mock {
    position: relative;
    perspective: 1400px;
  }
  .sp-hero-mock-frame {
    position: relative;
    background: var(--sp-card);
    border: 1px solid var(--sp-border-2);
    border-radius: var(--sp-rad-lg);
    overflow: hidden;
    box-shadow: var(--sp-shadow);
    transform: rotateY(-6deg) rotateX(2deg);
    transition: transform 0.3s ease;
  }
  .sp-hero-mock-frame:hover { transform: rotateY(-3deg) rotateX(1deg); }
  .sp-hero-mock-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(var(--sp-border) 1px, transparent 1px),
      linear-gradient(90deg, var(--sp-border) 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.5;
    pointer-events: none;
  }
  .sp-hero-mock-windowbar {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--sp-border);
    background: var(--sp-card-hi);
    position: relative; z-index: 1;
  }
  .sp-hero-mock-dots { display: inline-flex; gap: 6px; }
  .sp-hero-mock-dots i {
    width: 10px; height: 10px; border-radius: 999px; background: var(--sp-border-2);
  }
  .sp-hero-mock-dots i:first-child { background: #FF5F57; }
  .sp-hero-mock-dots i:nth-child(2) { background: #FEBC2E; }
  .sp-hero-mock-dots i:nth-child(3) { background: #28C840; }
  .sp-hero-mock-url {
    flex: 1; text-align: center;
    font-size: 11px; color: var(--sp-muted);
    background: var(--sp-bg); padding: 5px 10px;
    border-radius: 6px; border: 1px solid var(--sp-border);
  }
  .sp-hero-mock-stat {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10.5px; font-weight: 600; color: var(--sp-accent);
    background: var(--sp-accent-soft);
    padding: 4px 8px; border-radius: 6px;
    font-family: var(--sp-font-mono);
  }
  .sp-hero-mock-stat-dot {
    width: 6px; height: 6px; border-radius: 999px; background: var(--sp-accent);
  }
  .sp-hero-mock-body {
    position: relative; z-index: 1;
    padding: 28px 28px 24px;
  }
  .sp-hero-mock-eyebrow { margin-bottom: 8px; }
  .sp-hero-mock-title {
    font-family: var(--sp-font-display);
    font-size: 22px; font-weight: 600; color: var(--sp-text);
    margin-bottom: 24px;
  }
  .sp-hero-mock-dims {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
    padding: 16px; background: var(--sp-bg);
    border: 1px solid var(--sp-border);
    border-radius: 12px;
    margin-bottom: 22px;
  }
  .sp-dim {
    display: flex; flex-direction: column; gap: 4px;
    padding: 8px 12px; border-right: 1px solid var(--sp-border);
  }
  .sp-dim:last-child { border-right: 0; }
  .sp-dim-label {
    font-family: var(--sp-font-mono); font-size: 10px;
    color: var(--sp-muted); text-transform: uppercase; letter-spacing: 0.1em;
  }
  .sp-dim-value { font-size: 18px; font-weight: 600; color: var(--sp-text); }
  .sp-dim-accent .sp-dim-value { color: var(--sp-accent); }

  .sp-hero-mock-results {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 20px;
  }
  .sp-hero-mock-row {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 13px; color: var(--sp-text-2);
    padding: 6px 0;
  }
  .sp-hero-mock-row strong { font-size: 15px; color: var(--sp-text); font-weight: 600; }
  .sp-hero-mock-row-grand {
    border-top: 1px dashed var(--sp-border-2);
    padding-top: 14px; margin-top: 6px;
  }
  .sp-hero-mock-row-grand span { color: var(--sp-text); font-weight: 500; }
  .sp-hero-mock-row-grand strong { color: var(--sp-accent); font-size: 22px; font-weight: 700; }

  .sp-hero-mock-pdf {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 14px; background: var(--sp-card-hi);
    border: 1px solid var(--sp-border);
    border-radius: 10px;
    font-size: 12px; color: var(--sp-text-2);
  }
  .sp-hero-mock-pdf-time { color: var(--sp-green); font-weight: 600; margin-left: 4px; }

  /* Floating chips */
  .sp-hero-mock-float {
    position: absolute;
    background: var(--sp-card);
    border: 1px solid var(--sp-border-2);
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 12px; font-weight: 500;
    color: var(--sp-text);
    display: inline-flex; align-items: center; gap: 7px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    z-index: 2;
  }
  .sp-hero-mock-float svg { color: var(--sp-accent); }
  .sp-hero-mock-float-1 { top: -14px; right: 32px; animation: sp-float 5s ease-in-out infinite; }
  .sp-hero-mock-float-2 { bottom: 24px; left: -28px; animation: sp-float 6s ease-in-out infinite 1s; }
  @keyframes sp-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  @media (max-width: 980px) {
    .sp-hero-inner { grid-template-columns: 1fr; gap: 56px; }
    .sp-hero-mock-frame { transform: none; }
    .sp-hero-mock-float-2 { left: 8px; }
  }

  /* ================================================================
     TRUST STRIP
     ================================================================ */
  .sp-trust { padding: 56px 0; border-top: 1px solid var(--sp-border); border-bottom: 1px solid var(--sp-border); }
  .sp-trust-heading {
    text-align: center; font-size: 12px;
    color: var(--sp-muted);
    font-family: var(--sp-font-mono);
    text-transform: uppercase; letter-spacing: 0.12em;
    margin-bottom: 28px;
  }
  .sp-trust-row {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 8px 48px; align-items: center;
  }
  .sp-trust-logo {
    font-family: var(--sp-font-display);
    font-size: 16px; font-weight: 600;
    color: var(--sp-muted);
    letter-spacing: -0.01em;
    opacity: 0.7;
    transition: opacity 0.2s ease, color 0.2s ease;
  }
  .sp-trust-logo:hover { opacity: 1; color: var(--sp-text-2); }

  /* ================================================================
     SUITE
     ================================================================ */
  .sp-suite { padding: var(--sp-pad-section) 0; }
  .sp-suite-grid {
    display: grid; gap: 18px;
    grid-template-columns: repeat(4, 1fr);
  }
  .sp-product {
    position: relative;
    background: var(--sp-card);
    border: 1px solid var(--sp-border);
    border-radius: var(--sp-rad-lg);
    padding: 22px 22px 26px;
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform 0.18s ease, border-color 0.18s ease;
    min-height: 280px;
  }
  .sp-product:hover { transform: translateY(-4px); border-color: var(--sp-border-2); }
  .sp-product-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 22px;
  }
  .sp-product-tag {
    font-family: var(--sp-font-mono); font-size: 9.5px;
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 4px 7px; border-radius: 5px;
    font-weight: 600;
  }
  .sp-product-tag-live { background: rgba(52,211,153,0.15); color: var(--sp-green); }
  .sp-product-tag-beta { background: rgba(74,141,247,0.15); color: var(--sp-blueprint); }
  .sp-product-tag-soon {
    background: var(--sp-card-hi); color: var(--sp-muted);
    border: 1px dashed var(--sp-border-2);
  }
  .sp-product-body { flex: 1; }
  .sp-product-name {
    font-size: 20px; font-weight: 600; color: var(--sp-text);
    margin-bottom: 6px;
    letter-spacing: -0.015em;
  }
  .sp-product-tagline {
    font-family: var(--sp-font-mono); font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--sp-muted); margin-bottom: 12px;
  }
  .sp-product-desc { font-size: 13px; color: var(--sp-text-2); line-height: 1.55; margin-bottom: 18px; }

  .sp-product-cta {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 12px;
    font-size: 12.5px; font-weight: 500;
    border-radius: 7px;
    border: 1px solid transparent;
    transition: all 0.15s ease;
    align-self: flex-start;
    line-height: 1;
  }
  .sp-product-cta-live {
    background: var(--sp-bg);
    color: var(--sp-text);
    border-color: var(--sp-border-2);
  }
  .sp-product-cta-live:hover {
    background: var(--sp-accent);
    color: #fff;
    border-color: var(--sp-accent);
    transform: translateY(-1px);
  }
  .sp-product-cta-ghost {
    background: transparent;
    color: var(--sp-text-2);
    border-color: var(--sp-border-2);
  }
  .sp-product-cta-ghost:hover { background: var(--sp-card-hi); color: var(--sp-text); }

  .sp-product-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  }
  .sp-product-bar-orange { background: #FF6B1A; }
  .sp-product-bar-blue   { background: #3B82F6; }
  .sp-product-bar-green  { background: #10B981; }
  .sp-product-bar-yellow { background: #EAB308; }

  @media (max-width: 1080px) { .sp-suite-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 540px)  { .sp-suite-grid { grid-template-columns: 1fr; } }

  /* ================================================================
     DEMO — ESTIMATOR
     ================================================================ */
  .sp-demo {
    padding: var(--sp-pad-section) 0;
    background: var(--sp-bg-2);
    border-top: 1px solid var(--sp-border);
    border-bottom: 1px solid var(--sp-border);
  }
  .sp-estimator {
    position: relative;
    background: var(--sp-card);
    border: 1px solid var(--sp-border-2);
    border-radius: var(--sp-rad-lg);
    overflow: hidden;
    box-shadow: var(--sp-shadow);
  }
  .sp-est-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
    gap: 0;
  }
  .sp-est-inputs {
    padding: 32px;
    border-right: 1px solid var(--sp-border);
  }
  .sp-est-result {
    padding: 32px;
    background: var(--sp-card-hi);
    position: relative;
  }
  .sp-est-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 16px; margin-bottom: 28px;
  }
  .sp-est-title { font-size: 22px; font-weight: 600; color: var(--sp-text); margin-top: 6px; }

  .sp-input-label {
    font-family: var(--sp-font-mono); font-size: 10.5px;
    color: var(--sp-muted); text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .sp-input-row { display: grid; gap: 14px; margin-bottom: 20px; }
  .sp-input-row-3 { grid-template-columns: 1fr 1fr 1fr; }
  .sp-input-row-2 { grid-template-columns: 1fr 1fr; }

  .sp-input-stepper {
    display: flex; align-items: center;
    background: var(--sp-bg);
    border: 1px solid var(--sp-border);
    border-radius: 10px;
    height: 44px;
    overflow: hidden;
  }
  .sp-step {
    width: 38px; height: 100%;
    display: inline-flex; align-items: center; justify-content: center;
    border: 0; background: transparent; color: var(--sp-muted);
    border-right: 1px solid var(--sp-border);
  }
  .sp-step:last-of-type { border-right: 0; border-left: 1px solid var(--sp-border); }
  .sp-step:hover { background: var(--sp-card-hi); color: var(--sp-text); }
  .sp-step-input {
    flex: 1; width: 100%;
    background: transparent; border: 0;
    text-align: center;
    font-family: var(--sp-font-mono);
    font-size: 16px; font-weight: 600;
    color: var(--sp-text);
    -moz-appearance: textfield;
    padding: 0 8px;
    min-width: 0;
  }
  .sp-step-input:focus { outline: none; }
  .sp-step-input::-webkit-outer-spin-button,
  .sp-step-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .sp-step-unit {
    font-family: var(--sp-font-mono); font-size: 11px;
    color: var(--sp-muted); padding-right: 4px;
  }

  /* Chips */
  .sp-opts { margin-bottom: 20px; }
  .sp-opts-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .sp-chip {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 14px;
    border: 1px solid var(--sp-border);
    background: var(--sp-bg);
    border-radius: 999px;
    font-size: 12.5px; color: var(--sp-text-2);
    transition: all 0.15s ease;
  }
  .sp-chip:hover { color: var(--sp-text); border-color: var(--sp-border-2); }
  .sp-chip.is-on {
    background: var(--sp-accent-soft);
    border-color: var(--sp-accent);
    color: var(--sp-accent);
  }
  .sp-chip-dot {
    width: 8px; height: 8px; border-radius: 999px;
    background: var(--sp-border-2);
    transition: background 0.15s ease;
  }
  .sp-chip-dot.is-on { background: var(--sp-accent); box-shadow: 0 0 0 3px var(--sp-accent-soft); }

  .sp-explain {
    margin-top: 8px;
    background: var(--sp-bg);
    border: 1px solid var(--sp-border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12.5px;
  }
  .sp-explain summary {
    cursor: pointer; color: var(--sp-muted);
    font-family: var(--sp-font-mono); text-transform: uppercase;
    font-size: 10.5px; letter-spacing: 0.1em;
    list-style: none;
  }
  .sp-explain summary::-webkit-details-marker { display: none; }
  .sp-explain summary::before {
    content: "+ "; color: var(--sp-accent); font-weight: 700;
  }
  .sp-explain[open] summary::before { content: "− "; }
  .sp-explain p { margin-top: 10px; color: var(--sp-text-2); line-height: 1.55; }

  /* Result side */
  .sp-est-result-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 18px;
  }
  .sp-est-livedot {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--sp-font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--sp-green);
  }
  .sp-est-livedot span {
    width: 7px; height: 7px; border-radius: 999px; background: var(--sp-green);
    box-shadow: 0 0 0 3px rgba(52,211,153,0.18);
    animation: sp-pulse 1.6s ease-in-out infinite;
  }

  .sp-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .sp-stat {
    background: var(--sp-bg); border: 1px solid var(--sp-border);
    border-radius: 12px; padding: 16px 18px;
  }
  .sp-stat-label {
    font-family: var(--sp-font-mono); font-size: 10px;
    color: var(--sp-muted); text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .sp-stat-value { display: flex; align-items: baseline; gap: 4px; }
  .sp-stat-num {
    font-family: var(--sp-font-display); font-size: 28px; font-weight: 600;
    color: var(--sp-text); letter-spacing: -0.02em;
  }
  .sp-stat-unit { font-family: var(--sp-font-mono); font-size: 12px; color: var(--sp-muted); }
  .sp-stat-sub { font-size: 11px; color: var(--sp-muted); margin-top: 6px; }

  .sp-quote-lines {
    background: var(--sp-bg);
    border: 1px solid var(--sp-border);
    border-radius: 12px;
    margin-bottom: 18px;
    max-height: 240px;
    overflow-y: auto;
  }
  .sp-line {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 12px; padding: 12px 16px;
    border-bottom: 1px solid var(--sp-border);
  }
  .sp-line:last-child { border-bottom: 0; }
  .sp-line-left { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .sp-line-sku { font-size: 10px; color: var(--sp-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .sp-line-label { font-size: 13px; color: var(--sp-text); }
  .sp-line-right { display: flex; flex-direction: column; gap: 2px; text-align: right; }
  .sp-line-qty { font-size: 11px; color: var(--sp-muted); }
  .sp-line-total { font-size: 14px; font-weight: 600; color: var(--sp-text); }

  .sp-totals {
    background: var(--sp-bg);
    border: 1px solid var(--sp-border);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 18px;
  }
  .sp-totals-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 5px 0;
    font-size: 13px;
    color: var(--sp-text);
  }
  .sp-totals-row-muted { color: var(--sp-muted); }
  .sp-totals-grand {
    border-top: 1px dashed var(--sp-border-2);
    padding-top: 12px; margin-top: 6px;
    font-size: 16px;
  }
  .sp-totals-grand span:last-child { font-size: 22px; font-weight: 700; color: var(--sp-accent); }

  .sp-est-actions { display: flex; gap: 10px; }
  .sp-est-actions .sp-btn-primary { flex: 1; justify-content: center; padding: 13px 16px; }
  .sp-est-actions .sp-btn-ghost { padding: 13px 18px; }

  .sp-toast {
    position: absolute; left: 50%; bottom: 18px;
    transform: translateX(-50%);
    background: var(--sp-text); color: var(--sp-bg);
    padding: 8px 14px; border-radius: 999px;
    font-size: 12.5px; font-weight: 500;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    animation: sp-toast-in 0.25s ease;
    z-index: 10;
  }
  @keyframes sp-toast-in { from { opacity: 0; transform: translateX(-50%) translateY(8px); } }

  @media (max-width: 980px) {
    .sp-est-grid { grid-template-columns: 1fr; }
    .sp-est-inputs { border-right: 0; border-bottom: 1px solid var(--sp-border); }
    .sp-input-row-3 { grid-template-columns: 1fr 1fr 1fr; }
    .sp-est-inputs, .sp-est-result { padding: 24px; }
  }
  @media (max-width: 540px) {
    .sp-input-row-3 { grid-template-columns: 1fr; }
    .sp-est-header { flex-direction: column; }
  }

  /* ================================================================
     QUOTE MODAL
     ================================================================ */
  .sp-modal-backdrop {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    animation: sp-fade 0.2s ease;
  }
  @keyframes sp-fade { from { opacity: 0; } }
  .sp-modal {
    background: var(--sp-bg);
    color: var(--sp-text);
    border: 1px solid var(--sp-border-2);
    border-radius: 14px;
    max-width: 820px; width: 100%;
    max-height: 90vh; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }
  .sp-modal-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--sp-border);
    background: var(--sp-card-hi);
  }
  .sp-modal-bar-title { font-size: 13px; font-weight: 500; color: var(--sp-text); }
  .sp-modal-bar-actions { display: flex; gap: 6px; align-items: center; }
  .sp-modal-x {
    width: 30px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: 0; color: var(--sp-muted);
    border-radius: 6px;
  }
  .sp-modal-x:hover { background: var(--sp-card); color: var(--sp-text); }

  .sp-quote-page {
    background: #fff;
    color: #0E0F10;
    padding: 36px 44px;
    overflow-y: auto;
    font-family: 'Inter', sans-serif;
  }
  .sp-quote-head {
    display: flex; justify-content: space-between; gap: 24px;
    padding-bottom: 20px;
    border-bottom: 2px solid #0E0F10;
    margin-bottom: 24px;
  }
  .sp-quote-company {
    font-size: 11px; line-height: 1.55; color: #555;
    margin-top: 12px;
  }
  .sp-quote-meta-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px; font-weight: 700; letter-spacing: 0.12em;
    color: var(--sp-accent);
    margin-bottom: 8px;
  }
  .sp-quote-meta table { font-size: 11.5px; }
  .sp-quote-meta td { padding: 2px 6px; }
  .sp-quote-meta td:first-child { color: #777; }
  .sp-quote-meta td:last-child { font-family: 'JetBrains Mono', monospace; font-weight: 500; }
  .sp-quote-section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em;
    color: #777; margin-bottom: 6px;
  }
  .sp-quote-client { font-size: 13px; line-height: 1.55; margin-bottom: 28px; }

  .sp-quote-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .sp-quote-table thead { background: #0E0F10; color: #fff; }
  .sp-quote-table th {
    text-align: left; padding: 8px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .sp-quote-table td { padding: 10px 10px; border-bottom: 1px solid #E5E5E0; }
  .sp-quote-table .mono { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }

  .sp-quote-totals { display: flex; justify-content: flex-end; padding-top: 16px; }
  .sp-quote-totals table { font-size: 12.5px; }
  .sp-quote-totals td { padding: 5px 14px; }
  .sp-quote-totals td:last-child { text-align: right; min-width: 110px; font-family: 'JetBrains Mono', monospace; }
  .sp-quote-grand td {
    border-top: 2px solid #0E0F10; padding-top: 10px;
    font-family: 'Space Grotesk', sans-serif !important;
    font-size: 16px; font-weight: 700; color: var(--sp-accent);
  }
  .sp-quote-grand td:last-child { font-family: 'JetBrains Mono', monospace !important; }

  .sp-quote-foot {
    margin-top: 28px; padding-top: 18px;
    border-top: 1px solid #E5E5E0;
    display: flex; justify-content: space-between; gap: 18px;
    font-size: 10.5px; color: #555;
  }
  .sp-quote-foot-brand { white-space: nowrap; }

  @media print {
    body * { visibility: hidden; }
    .sp-modal-backdrop, .sp-modal-backdrop * { visibility: visible; }
    .sp-modal-bar { display: none; }
    .sp-modal-backdrop { position: static; padding: 0; background: #fff; }
    .sp-modal { box-shadow: none; border: 0; max-height: none; }
  }

  /* ================================================================
     FEATURES
     ================================================================ */
  .sp-features { padding: var(--sp-pad-section) 0; }
  .sp-feat-grid {
    display: grid; gap: 1px;
    grid-template-columns: repeat(3, 1fr);
    background: var(--sp-border);
    border: 1px solid var(--sp-border);
    border-radius: var(--sp-rad-lg);
    overflow: hidden;
  }
  .sp-feat {
    background: var(--sp-bg);
    padding: 32px 28px;
    transition: background 0.18s ease;
  }
  .sp-feat:hover { background: var(--sp-card-hi); }
  .sp-feat-icon {
    width: 44px; height: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--sp-accent-soft);
    color: var(--sp-accent);
    border-radius: 10px;
    margin-bottom: 20px;
  }
  .sp-feat-title { font-size: 18px; font-weight: 600; color: var(--sp-text); margin-bottom: 10px; }
  .sp-feat-desc { font-size: 13.5px; line-height: 1.6; color: var(--sp-text-2); }
  @media (max-width: 980px) { .sp-feat-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .sp-feat-grid { grid-template-columns: 1fr; } }

  /* ================================================================
     WORKFLOW
     ================================================================ */
  .sp-workflow { padding: var(--sp-pad-section) 0; background: var(--sp-bg-2); border-top: 1px solid var(--sp-border); border-bottom: 1px solid var(--sp-border); }
  .sp-flow-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .sp-flow-step {
    background: var(--sp-card);
    border: 1px solid var(--sp-border);
    border-radius: var(--sp-rad-lg);
    padding: 28px;
    display: flex; flex-direction: column;
    position: relative;
  }
  .sp-flow-num {
    font-family: var(--sp-font-mono); font-size: 13px;
    color: var(--sp-accent); font-weight: 600;
    margin-bottom: 18px;
    letter-spacing: 0.06em;
  }
  .sp-flow-mock {
    background: var(--sp-bg);
    border: 1px solid var(--sp-border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 22px;
    min-height: 200px;
  }
  .sp-flow-title { font-size: 19px; font-weight: 600; color: var(--sp-text); margin-bottom: 8px; }
  .sp-flow-desc { font-size: 13.5px; color: var(--sp-text-2); line-height: 1.55; }
  @media (max-width: 900px) { .sp-flow-grid { grid-template-columns: 1fr; } }

  .sp-mini-card { display: flex; flex-direction: column; gap: 10px; }
  .sp-mini-bar { display: flex; gap: 4px; margin-bottom: 6px; }
  .sp-mini-bar span { width: 6px; height: 6px; border-radius: 999px; background: var(--sp-border-2); }
  .sp-mini-field { display: flex; flex-direction: column; gap: 4px; }
  .sp-mini-field label {
    font-family: var(--sp-font-mono); font-size: 9px;
    color: var(--sp-muted); text-transform: uppercase; letter-spacing: 0.1em;
  }
  .sp-mini-input {
    font-size: 12px; padding: 6px 10px;
    background: var(--sp-card-hi); border: 1px solid var(--sp-border);
    border-radius: 6px; color: var(--sp-text);
  }
  .sp-mini-pill {
    display: inline-block; align-self: flex-start;
    padding: 3px 8px; background: var(--sp-accent-soft);
    color: var(--sp-accent); font-size: 10px; font-weight: 600;
    border-radius: 4px; font-family: var(--sp-font-mono);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-top: 4px;
  }
  .sp-mini-eyebrow { color: var(--sp-muted); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2px; }
  .sp-mini-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .sp-mini-dim {
    background: var(--sp-card-hi); border: 1px solid var(--sp-border);
    border-radius: 6px; padding: 8px;
    text-align: center;
  }
  .sp-mini-dim span { display: block; font-family: var(--sp-font-mono); font-size: 9px; color: var(--sp-muted); }
  .sp-mini-dim b { display: block; font-size: 14px; color: var(--sp-text); margin-top: 2px; }
  .sp-mini-result { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .sp-mini-result > div { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; }
  .sp-mini-result span { color: var(--sp-muted); }
  .sp-mini-result b { color: var(--sp-text); font-weight: 600; }
  .sp-mini-result > div:last-child b { color: var(--sp-accent); font-size: 14px; }

  .sp-mini-pdf { background: linear-gradient(180deg, var(--sp-bg) 0%, var(--sp-card-hi) 100%); }
  .sp-mini-pdf-head { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 8px; border-bottom: 1.5px solid var(--sp-text); }
  .sp-mini-pdf-brand { font-size: 10px; font-weight: 700; color: var(--sp-text); letter-spacing: 0.04em; }
  .sp-mini-pdf-addr { font-size: 8.5px; color: var(--sp-muted); margin-top: 2px; }
  .sp-mini-pdf-num { font-size: 11px; color: var(--sp-accent); font-weight: 600; }
  .sp-mini-pdf-lines { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .sp-mini-pdf-lines div { height: 5px; background: var(--sp-border); border-radius: 2px; }
  .sp-mini-pdf-lines div:nth-child(2) { width: 80%; }
  .sp-mini-pdf-lines div:nth-child(3) { width: 65%; }
  .sp-mini-pdf-lines div:nth-child(4) { width: 50%; }
  .sp-mini-pdf-total {
    margin-top: 10px; padding-top: 8px;
    border-top: 1.5px solid var(--sp-text);
    text-align: right; font-size: 16px; font-weight: 700; color: var(--sp-accent);
  }
  .sp-mini-pdf-total span { font-size: 10px; color: var(--sp-muted); margin-left: 4px; }
  .sp-mini-pdf-cta {
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 8px; padding: 6px 10px;
    background: var(--sp-accent); color: #fff;
    border-radius: 6px; font-size: 11px; font-weight: 500;
    align-self: flex-start;
  }

  /* ================================================================
     PRICING
     ================================================================ */
  .sp-pricing { padding: var(--sp-pad-section) 0; }
  .sp-price-grid {
    display: grid; gap: 20px;
    grid-template-columns: repeat(3, 1fr);
    align-items: stretch;
  }
  .sp-plan {
    background: var(--sp-card);
    border: 1px solid var(--sp-border);
    border-radius: var(--sp-rad-lg);
    padding: 32px;
    position: relative;
    display: flex; flex-direction: column;
  }
  .sp-plan.is-featured {
    border-color: var(--sp-accent);
    background: linear-gradient(180deg, var(--sp-card-hi) 0%, var(--sp-card) 100%);
    box-shadow: 0 0 0 1px var(--sp-accent), 0 12px 40px var(--sp-accent-soft);
  }
  .sp-plan-flag {
    position: absolute; top: -12px; left: 32px;
    padding: 4px 10px;
    background: var(--sp-accent); color: #fff;
    border-radius: 6px; font-family: var(--sp-font-mono);
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .sp-plan-name {
    font-family: var(--sp-font-display); font-size: 18px;
    font-weight: 600; color: var(--sp-text); margin-bottom: 18px;
  }
  .sp-plan-price { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
  .sp-plan-amount {
    font-family: var(--sp-font-display); font-size: 44px; font-weight: 600;
    color: var(--sp-text); letter-spacing: -0.03em; line-height: 1;
  }
  .sp-plan-cadence { font-size: 13px; color: var(--sp-muted); }
  .sp-plan-desc { font-size: 13.5px; color: var(--sp-text-2); margin-bottom: 24px; min-height: 38px; }
  .sp-plan-features {
    list-style: none; padding: 0; margin: 0 0 24px;
    display: flex; flex-direction: column; gap: 10px;
    flex: 1;
  }
  .sp-plan-features li {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 13.5px; color: var(--sp-text-2);
  }
  .sp-plan-features svg { color: var(--sp-green); flex-shrink: 0; margin-top: 3px; }
  .sp-price-note {
    text-align: center; margin-top: 32px;
    font-size: 12px; color: var(--sp-muted);
    font-family: var(--sp-font-mono);
  }
  @media (max-width: 880px) { .sp-price-grid { grid-template-columns: 1fr; gap: 16px; } }

  /* ================================================================
     FAQ
     ================================================================ */
  .sp-faq { padding: var(--sp-pad-section) 0; background: var(--sp-bg-2); border-top: 1px solid var(--sp-border); border-bottom: 1px solid var(--sp-border); }
  .sp-faq-inner { display: grid; grid-template-columns: 1fr 1.6fr; gap: 80px; }
  .sp-faq-head { position: sticky; top: 96px; align-self: start; }
  .sp-faq-list { display: flex; flex-direction: column; gap: 4px; }
  .sp-faq-list details {
    background: var(--sp-card);
    border: 1px solid var(--sp-border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.15s ease;
  }
  .sp-faq-list details[open] { border-color: var(--sp-border-2); }
  .sp-faq-list summary {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 22px;
    font-size: 15.5px; font-weight: 500; color: var(--sp-text);
    cursor: pointer; list-style: none;
    gap: 16px;
  }
  .sp-faq-list summary::-webkit-details-marker { display: none; }
  .sp-faq-list summary svg { transition: transform 0.2s ease; color: var(--sp-muted); flex-shrink: 0; }
  .sp-faq-list details[open] summary svg { transform: rotate(180deg); }
  .sp-faq-a {
    padding: 0 22px 20px;
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--sp-text-2);
    max-width: 64ch;
  }
  @media (max-width: 880px) { .sp-faq-inner { grid-template-columns: 1fr; gap: 36px; } .sp-faq-head { position: static; } }

  /* ================================================================
     CTA BAND + FOOTER
     ================================================================ */
  .sp-cta-band {
    position: relative;
    padding: var(--sp-pad-section) 0;
    background: #0E0F12;
    color: #fff;
    overflow: hidden;
  }
  html.sp-light .sp-cta-band { background: #0E0F12; }
  .sp-cta-band-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 70% 40%, var(--sp-accent-soft) 0%, transparent 50%),
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 100% 100%, 48px 48px, 48px 48px;
    -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 0%, transparent 80%);
            mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 0%, transparent 80%);
  }
  .sp-cta-inner { position: relative; z-index: 1; text-align: center; max-width: 720px; margin: 0 auto; }
  .sp-cta-title {
    font-size: clamp(32px, 4.4vw, 54px); font-weight: 600;
    letter-spacing: -0.025em; color: #fff;
    margin-bottom: 18px;
  }
  .sp-cta-sub { color: rgba(255,255,255,0.7); font-size: 17px; margin-bottom: 32px; }
  .sp-cta-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .sp-footer { background: var(--sp-bg); border-top: 1px solid var(--sp-border); padding: 64px 0 32px; }
  .sp-footer-inner { display: grid; grid-template-columns: 1.4fr 2fr; gap: 64px; }
  .sp-footer-brand p { font-size: 13.5px; color: var(--sp-muted); margin: 16px 0 12px; max-width: 32ch; }
  .sp-footer-meta { font-size: 12px; color: var(--sp-muted); font-family: var(--sp-font-mono); }
  .sp-footer-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }
  .sp-footer-col-title {
    font-family: var(--sp-font-mono); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--sp-muted); margin-bottom: 14px;
  }
  .sp-footer-cols ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .sp-footer-cols a { font-size: 13.5px; color: var(--sp-text-2); }
  .sp-footer-cols a:hover { color: var(--sp-text); }
  .sp-footer-bottom {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 32px; margin-top: 48px;
    border-top: 1px solid var(--sp-border);
    font-size: 12px; color: var(--sp-muted);
  }
  @media (max-width: 880px) {
    .sp-footer-inner { grid-template-columns: 1fr; gap: 36px; }
    .sp-footer-cols { grid-template-columns: 1fr 1fr; }
  }

  /* Tweaks panel overrides */
  html.sp-light .twk-panel { background: rgba(20,20,24,0.88); color: #F4F4F5; border-color: rgba(255,255,255,0.12); }
  html.sp-light .twk-hd b { color: #F4F4F5; }
  html.sp-light .twk-lbl { color: rgba(244,244,245,0.72); }
  html.sp-light .twk-val { color: rgba(244,244,245,0.5); }
  html.sp-light .twk-x { color: rgba(244,244,245,0.55); }
  html.sp-light .twk-x:hover { background: rgba(255,255,255,0.06); color: #F4F4F5; }
</style>
